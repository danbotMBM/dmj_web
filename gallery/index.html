<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Photo Scrubber</title>

<style>
  body {
    font-family: sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  h2 {
    margin-bottom: 10px;
  }

  #viewer {
    position: relative;
    width: 80vw;
    max-width: 800px;
    height: 60vh;
    max-height: 500px;
    background: black;
    border: 1px solid #333;
    overflow: hidden;

    /* Camera */
    perspective: 1200px;
  }

  #photo {
    width: 100%;
    height: 100%;
    object-fit: contain;

    transform-origin: center center;
    backface-visibility: hidden;
    will-change: transform;

    transition: transform 0.25s ease;
  }

  #controls {
    width: 80vw;
    max-width: 800px;
    margin-top: 15px;
  }

  input[type="range"] {
    width: 100%;
  }

  #label {
    text-align: center;
    margin-top: 6px;
    font-size: 0.9em;
    opacity: 0.8;
  }
</style>
</head>

<body>

<h2>3D Photo Scrubber</h2>

<div id="viewer">
  <img id="photo" draggable="false">
</div>

<div id="controls">
  <input type="range" id="slider" min="0" step="1" value="0">
  <div id="label"></div>
</div>

<script>
  const images = [
    "images/DSC_0807.JPG",
    "images/DSC_0808.JPG",
    "images/DSC_0809.JPG",
    "images/DSC_0810.JPG",
    "images/DSC_0811.JPG",
    "images/DSC_0812.JPG",
    "images/DSC_0813.JPG",
    "images/DSC_0814.JPG",
    "images/DSC_0815.JPG",
    "images/DSC_0816.JPG",
    "images/DSC_0817.JPG",
    "images/DSC_0818.JPG",
    "images/DSC_0819.JPG",
    "images/DSC_0820.JPG"
  ];

  const MAX_ANGLE = 35; // degrees

  const photo  = document.getElementById("photo");
  const slider = document.getElementById("slider");
  const label  = document.getElementById("label");

  slider.max = images.length - 1;

  /* ------------------------------------------
     Preload images (no latency on swap)
  ------------------------------------------ */
  const cache = images.map(src => {
    const img = new Image();
    img.src = src;
    return img;
  });

  // Initialize with first image
  photo.src = cache[0].src;
  label.textContent = `Image 1 / ${images.length}`;

  /* ------------------------------------------
     Slider → rotation + bitmap swap
  ------------------------------------------ */
  slider.addEventListener("input", () => {
    const index = Number(slider.value);
    const max   = images.length - 1;

    // Normalize [0..max] → [-1..1]
    const t = (index / max) * 2 - 1;

    // Optional easing for realism
    const eased = Math.sign(t) * Math.pow(Math.abs(t), 0.85);

    const angle = eased * MAX_ANGLE;

    // Maintain transform state
    photo.style.transform = `rotateY(${angle}deg)`;

    // Instant bitmap swap
    photo.src = cache[index].src;

    label.textContent = `Image ${index + 1} / ${images.length}`;
  });
</script>

</body>
</html>
