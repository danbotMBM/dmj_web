<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Stack Slider</title>

<style>
  body {
    font-family: sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  #viewer {
    position: relative;
    width: 80vw;
    max-width: 800px;
    height: 60vh;
    max-height: 500px;
    border: 1px solid #333;
    overflow: hidden;
    background: black;
  }

  #viewer img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
  }

  #viewer img.active {
    opacity: 1;
  }

  #controls {
    width: 80vw;
    max-width: 800px;
    margin-top: 15px;
  }

  input[type="range"] {
    width: 100%;
  }

  #label {
    text-align: center;
    margin-top: 6px;
    font-size: 0.9em;
    opacity: 0.8;
  }
</style>
</head>

<body>

<h2>Photo Stack Slider</h2>

<div id="viewer"></div>

<div id="controls">
  <input type="range" id="slider" min="0" max="0" step="1" value="0">
  <div id="label"></div>
</div>

<script>
  const images = [
    "images/DSC_0807.JPG",
    "images/DSC_0808.JPG",
    "images/DSC_0809.JPG",
    "images/DSC_0810.JPG",
    "images/DSC_0811.JPG",
    "images/DSC_0812.JPG",
    "images/DSC_0813.JPG",
    "images/DSC_0814.JPG",
    "images/DSC_0815.JPG",
    "images/DSC_0816.JPG",
    "images/DSC_0817.JPG",
    "images/DSC_0818.JPG",
    "images/DSC_0819.JPG",
    "images/DSC_0820.JPG",
  ];

  const viewer = document.getElementById("viewer");
  const slider = document.getElementById("slider");
  const label  = document.getElementById("label");

  const imgElements = [];

  images.forEach((src, i) => {
    const img = document.createElement("img");
    img.src = src;
    if (i === 0) img.classList.add("active");
    viewer.appendChild(img);
    imgElements.push(img);
  });

  slider.max = images.length - 1;
  label.textContent = `Image 1 / ${images.length}`;

  slider.addEventListener("input", () => {
    const index = Number(slider.value);

    imgElements.forEach((img, i) => {
      img.classList.toggle("active", i === index);
    });

    label.textContent = `Image ${index + 1} / ${images.length}`;
  });
</script>

</body>
</html>
