<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Photo Scrubber</title>

<style>
  body {
    font-family: sans-serif;
    background: #111;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  h2 {
    margin-bottom: 10px;
  }

  #viewer {
    position: relative;
    width: 80vw;
    max-width: 800px;
    height: 60vh;
    max-height: 500px;
    background: black;
    border: 1px solid #333;
    overflow: hidden;

    perspective: 1200px;

    touch-action: none; /* 🚨 critical for mobile drag */
    cursor: grab;
  }

  #viewer.dragging {
    cursor: grabbing;
  }

  #photo {
    width: 100%;
    height: 100%;
    object-fit: contain;

    transform-origin: center center;
    backface-visibility: hidden;
    will-change: transform;

    transition: transform 0.5s ease;
    pointer-events: none;
  }

  #controls {
    width: 80vw;
    max-width: 800px;
    margin-top: 15px;
  }

  input[type="range"] {
    width: 100%;
  }

  #label {
    text-align: center;
    margin-top: 6px;
    font-size: 0.9em;
    opacity: 0.8;
  }
</style>
</head>

<body>

<h2>3D Photo Scrubber</h2>

<div id="viewer">
  <img id="photo" draggable="false">
</div>

<div id="controls">
  <input type="range" id="slider" min="0" step="1" value="0">
  <div id="label"></div>
</div>

<script>
  const images = [
    "images/DSC_0807.JPG",
    "images/DSC_0808.JPG",
    "images/DSC_0809.JPG",
    "images/DSC_0810.JPG",
    "images/DSC_0811.JPG",
    "images/DSC_0812.JPG",
    "images/DSC_0813.JPG",
    "images/DSC_0814.JPG",
    "images/DSC_0815.JPG",
    "images/DSC_0816.JPG",
    "images/DSC_0817.JPG",
    "images/DSC_0818.JPG",
    "images/DSC_0819.JPG",
    "images/DSC_0820.JPG"
  ];

  const MAX_ANGLE = 35;
  const DRAG_SENSITIVITY = 0.6;

  const viewer = document.getElementById("viewer");
  const photo  = document.getElementById("photo");
  const slider = document.getElementById("slider");
  const label  = document.getElementById("label");

  slider.max = images.length - 1;

  /* ------------------------------------------
     Preload images
  ------------------------------------------ */
  const cache = images.map(src => {
    const img = new Image();
    img.src = src;
    return img;
  });

  let index = 0;
  photo.src = cache[0].src;
  label.textContent = `Image 1 / ${images.length}`;

  /* ------------------------------------------
     Core update function
  ------------------------------------------ */
  function updateFromIndex(i) {
    index = Math.max(0, Math.min(images.length - 1, i));
    slider.value = index;

    const t = (index / (images.length - 1)) * 2 - 1;
    const eased = Math.sign(t) * Math.pow(Math.abs(t), 0.85);
    const angle = eased * MAX_ANGLE;

    photo.style.transform = `rotateY(${angle}deg)`;
    photo.src = cache[index].src;

    label.textContent = `Image ${index + 1} / ${images.length}`;
  }

  /* ------------------------------------------
     Slider input
  ------------------------------------------ */
  slider.addEventListener("input", () => {
    updateFromIndex(Number(slider.value));
  });

  /* ------------------------------------------
     Pointer (mouse + touch) drag support
  ------------------------------------------ */
  let dragging = false;
  let startX = 0;
  let startIndex = 0;

  viewer.addEventListener("pointerdown", e => {
    dragging = true;
    viewer.classList.add("dragging");

    viewer.setPointerCapture(e.pointerId);

    startX = e.clientX;
    startIndex = index;
  });

  viewer.addEventListener("pointermove", e => {
    if (!dragging) return;

    const dx = e.clientX - startX;
    const deltaIndex =
      dx * DRAG_SENSITIVITY / viewer.clientWidth * images.length;

    updateFromIndex(Math.round(startIndex + deltaIndex));
  });

  function endDrag(e) {
    dragging = false;
    viewer.classList.remove("dragging");

    try {
      viewer.releasePointerCapture(e.pointerId);
    } catch {}
  }

  viewer.addEventListener("pointerup", endDrag);
  viewer.addEventListener("pointercancel", endDrag);
  viewer.addEventListener("pointerleave", endDrag);
</script>

</body>
</html>
